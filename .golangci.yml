version: "2"

run:
  modules-download-mode: readonly
  issues-exit-code: 2
  tests: false

linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dogsled
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - fatcontext
    - forbidigo
    - gocheckcompilerdirectives
    - gochecksumtype
    - goheader
    - goprintffuncname
    - govet
    - ineffassign
    - loggercheck
    - makezero
    - mirror
    - modernize
    - musttag
    - nilerr
    - nolintlint
    - nosprintfhostport
    - reassign
    - rowserrcheck
    - sloglint
    - staticcheck
    - tagalign
    - unconvert
    - usestdlibvars
    - wastedassign
    - whitespace
    - wsl_v5
  settings:
    dogsled:
      max-blank-identifiers: 1
    errcheck:
      exclude-functions:
        - io/ioutil.ReadFile
        - os/file.Close
        - database/sql/(*DB).Close
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
    forbidigo:
      forbid:
        - pattern: ^print$
        - pattern: ^println$
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
      case-max-lines: 20
      disable:
        - assign
        - decl
  exclusions:
    generated: strict
    warn-unused: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
      custom-order: true
      no-inline-comments: true
      no-prefix-comments: true
    gofumpt:
      module-path: github.com/tmoeish/tsq
      extra-rules: true
  exclusions:
    generated: strict
    warn-unused: true
